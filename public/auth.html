<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Login - Prep AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.symbols-outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Inter', sans-serif; background-color: #05050a; color: #e3e0f8; overflow: hidden; }
  .font-headline { font-family: 'Space Grotesk', sans-serif; }
  
  #galaxy-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); overflow: hidden;
  }
  .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: moveStar linear infinite; }
  @keyframes moveStar { from { transform: translateY(0); } to { transform: translateY(-2000px); } }
  
  .glass-panel {
    background: rgba(18, 18, 34, 0.45);
    backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 0 60px -10px rgba(124,111,247,0.18);
  }

  .mode-toggle-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .auth-mode-active { color: #c6c0ff; border-bottom: 2px solid #8b80ff; }
  
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(139,128,255,0.2); border-top-color: #c6c0ff;
    border-radius: 50%; animation: spin 0.65s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: rgba(18,18,34,0.95); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 12px 24px; font-size: 14px; font-weight: 600;
    transition: all 0.4s cubic-bezier(.34,1.56,.64,1); opacity: 0; z-index: 1000;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.error { border-color: rgba(248,113,113,0.5); color: #f87171; }
  #toast.success { border-color: rgba(52,211,153,0.5); color: #34d399; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div id="galaxy-bg"></div>
<div id="toast"></div>

<div class="w-full max-w-md p-4 animate-fade-in">
  <div class="glass-panel rounded-3xl p-8 lg:p-10 space-y-8 relative overflow-hidden">
    
    <!-- Logo area -->
    <div class="text-center relative">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#8b80ff] to-[#c6c0ff] mx-auto flex items-center justify-center shadow-lg shadow-indigo-500/20 mb-4">
        <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL' 1;font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif">PrepAI</span>
      </div>
      <h1 class="text-3xl font-black font-headline tracking-tighter text-white">Welcome</h1>
      <p class="text-slate-400 text-sm">Join the AI interview revolution</p>
    </div>

    <!-- Toggle -->
    <div class="flex border-b border-white/5">
      <button onclick="toggleAuthMode('login')" id="btn-login-tab" class="mode-toggle-btn flex-1 py-3 text-sm font-bold uppercase tracking-widest auth-mode-active">Login</button>
      <button onclick="toggleAuthMode('signup')" id="btn-signup-tab" class="mode-toggle-btn flex-1 py-3 text-sm font-bold uppercase tracking-widest text-slate-500 hover:text-slate-300">Sign Up</button>
    </div>

    <!-- Form -->
    <form id="auth-form" class="space-y-6">
      
      <div id="username-field" class="hidden">
        <label for="username" class="block text-[10px] font-black uppercase tracking-[0.2em] text-primary/70 mb-2">Username</label>
        <input type="text" id="username" placeholder="TIJIRA" 
               class="w-full bg-slate-950/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-[#8b80ff] focus:ring-1 focus:ring-[#8b80ff]/30 transition-all outline-none">
      </div>

      <div>
        <label for="email" class="block text-[10px] font-black uppercase tracking-[0.2em] text-primary/70 mb-2">Email Address</label>
        <input type="email" id="email" placeholder="arijit@example.com" required
               class="w-full bg-slate-950/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-[#8b80ff] focus:ring-1 focus:ring-[#8b80ff]/30 transition-all outline-none">
      </div>

      <div>
        <label for="password" class="block text-[10px] font-black uppercase tracking-[0.2em] text-primary/70 mb-2">Password</label>
        <input type="password" id="password" placeholder="••••••••" required
               class="w-full bg-slate-950/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-[#8b80ff] focus:ring-1 focus:ring-[#8b80ff]/30 transition-all outline-none">
      </div>

      <button type="submit" id="auth-btn"
              class="w-full bg-gradient-to-r from-[#8b80ff] to-[#c6c0ff] hover:from-[#7a6fef] hover:to-[#b5afff] text-[#21008e] font-black text-xs uppercase tracking-widest py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
        Let's Start
      </button>
    </form>

  </div>
</div>

<script>
  let currentMode = "login";

  // Create stars
  const bg = document.getElementById('galaxy-bg');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 'px';
    s.style.cssText = `width:${size}; height:${size}; left:${Math.random()*100}%; top:${Math.random()*100}%; opacity:${Math.random()}; animation-duration:${50 + Math.random()*100}s; animation-delay:${-(Math.random()*100)}s;`;
    bg.appendChild(s);
  }

  function toggleAuthMode(mode) {
    currentMode = mode;
    const isSignup = mode === "signup";
    
    document.getElementById("btn-signup-tab").className = `mode-toggle-btn flex-1 py-3 text-sm font-bold uppercase tracking-widest ${isSignup ? 'auth-mode-active' : 'text-slate-500 hover:text-slate-300'}`;
    document.getElementById("btn-login-tab").className = `mode-toggle-btn flex-1 py-3 text-sm font-bold uppercase tracking-widest ${!isSignup ? 'auth-mode-active' : 'text-slate-500 hover:text-slate-300'}`;
    
    document.getElementById("username-field").className = isSignup ? "block" : "hidden";
    document.getElementById("username").required = isSignup;
    document.getElementById("auth-btn").textContent = isSignup ? "Create Account" : "Access Console";
  }

  function toast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ""; }, 3500);
  }

  document.getElementById("auth-form").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("auth-btn");
    const originalText = btn.textContent;
    
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Processing...`;

    try {
      const endpoint = currentMode === "signup" ? "/auth/signup" : "/auth/login";
      const body = { email, password };
      if(currentMode === "signup") body.username = username;

      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!res.ok) {
        toast(data.error || "Authentication failed", "error");
      } else {
        if (currentMode === "signup") {
          toast("Registration successful! Please login.", "success");
          setTimeout(() => toggleAuthMode("login"), 1000);
        } else {
          localStorage.setItem("token", data.token);
          toast("Access granted. Initializing...", "success");
          setTimeout(() => { window.location.href = "/index.html"; }, 1000);
        }
      }
    } catch (err) {
      toast("Connection lost. Verify your server.", "error");
    } finally {
      btn.disabled = false;
      btn.textContent = originalText;
    }
  };
</script>

</body>
</html>
